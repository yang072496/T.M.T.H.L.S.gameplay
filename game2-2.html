<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在臺人滲 關卡 2-2</title>
    <style>
        :root { --bg-color: #2c2c2c; --paper-color: #e0d5c1; --accent-red: #8b0000; }
        
        body { 
            background: var(--bg-color); 
            color: #333; 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center;     
            min-height: 100vh; 
        }

        .story-box { 
            background: var(--paper-color); 
            width: 90%; 
            max-width: 400px; 
            padding: 25px; 
            border-radius: 5px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            border: 2px solid #555;
            box-sizing: border-box;
        }

        h2 { color: var(--accent-red); font-size: 1.3rem; border-bottom: 1px solid #999; padding-bottom: 10px; margin-top: 0; text-align: center; }

        .game-area { 
            position: relative; 
            margin: 20px auto; 
            width: 280px; 
            height: 280px; 
        }

        canvas { 
            width: 100%; 
            height: 100%;
            border: 4px solid #444; 
            border-radius: 50%; 
            background: #fff; 
            box-sizing: border-box;
        }

        #pointer { 
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 12px solid transparent; 
            border-right: 12px solid transparent; 
            border-top: 25px solid #ffcc00; 
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
            z-index: 10; 
        }

        .btn-container { text-align: center; margin-top: 20px; }

        .btn-spin { 
            background: var(--accent-red); 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            font-size: 1.1rem; 
            border-radius: 30px; 
            cursor: pointer; 
            box-shadow: 0 4px 0 #5a0000; 
            transition: 0.1s;
        }

        .btn-spin:disabled { background: #888; box-shadow: 0 4px 0 #444; cursor: not-allowed; opacity: 0.5;}
        .btn-spin:active:not(:disabled) { transform: translateY(4px); box-shadow: none; }

        #narrative { 
            margin-top: 15px; 
            font-size: 0.95rem; 
            line-height: 1.7; 
            text-align: justify; 
            height: 130px; 
            overflow-y: auto; 
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }

        .chance-text { font-size: 0.8rem; color: #555; margin-top: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="story-box">
    <h2>關卡 2-2 孩子的未來</h2>
    <div id="narrative">
        詩芶鯉㐻，妳帶著兒子陳志銘被流放在這片陌生的土地。曾經的戀人銘雄已逝，妳唯有將志銘送往孤兒院，才能換他一線生機。妳看著自己親身骨肉，下定決心...
    </div>
    
    <div class="game-area">
        <div id="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <div class="btn-container">
        <button id="spinBtn" class="btn-spin" onclick="spin()">幫助志銘 (剩餘 <span id="chances">3</span> 次)</button>
        <p class="chance-text">目的地：孤兒院 || 幫助對象：陳志銘</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    let chances = 3;
    
    const sectors = [
        { label: "失敗//流浪", color: "#666", win: false },
        { label: "成功//希望", color: "#8b0000", win: true },
        { label: "失敗//絕望", color: "#444", win: false }
    ];

    let angle = 0; 
    let spinVelocity = 0; 
    const friction = 0.991; 
    let spinIsActive = false;

    function draw() {
        const arc = (Math.PI * 2) / sectors.length;
        ctx.clearRect(0, 0, 500, 500);
        
        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(angle); 
        
        sectors.forEach((s, i) => {
            ctx.fillStyle = s.color;
            ctx.beginPath();
            const startArc = i * arc - Math.PI / 2;
            const endArc = (i + 1) * arc - Math.PI / 2;
            ctx.arc(0, 0, 250, startArc, endArc);
            ctx.lineTo(0, 0);
            ctx.fill();
            
            ctx.save();
            ctx.fillStyle = "#fff";
            ctx.rotate(startArc + arc / 2 + Math.PI / 2); 
            ctx.font = "bold 32px Arial";
            const text = s.label;
            ctx.fillText(text, -ctx.measureText(text).width / 2, -160);
            ctx.restore();
        });
        ctx.restore(); 
    }

    function animateSpin() {
        if (!spinIsActive) return;
        spinVelocity *= friction; 
        angle += spinVelocity; 
        if (spinVelocity < 0.002) {
            spinIsActive = false;
            spinVelocity = 0;
            determineResult();
        } else {
            draw();
            requestAnimationFrame(animateSpin);
        }
    }

    function spin() {
        if (spinIsActive || chances <= 0 || spinBtn.dataset.ended === "true") return;
        chances--;
        document.getElementById('chances').innerText = chances;
        spinBtn.disabled = true;
        spinVelocity = Math.random() * 0.15 + 0.3; 
        spinIsActive = true;
        animateSpin();
    }

    function determineResult() {
        const totalArc = Math.PI * 2;
        const arc = totalArc / sectors.length;
        let relativeAngle = (totalArc - (angle % totalArc)) % totalArc;
        const resultIndex = Math.floor(relativeAngle / arc);
        const result = sectors[resultIndex];
        const nav = document.getElementById('narrative');

        if (result.win) {
            spinBtn.dataset.ended = "true";
            spinBtn.disabled = true;
            spinBtn.innerHTML = "已達成結局";
            
            // 儲存進度：解鎖 3-1 (清單中第 4 個關卡)
            localStorage.setItem('formosa_stage', 4);
            
            nav.innerHTML = "<b>【成功】</b> 志銘順利翻過院牆，落入孤兒院的草堆中。妳忍著淚遠去，至少他不必陪妳在街頭餓死。";
            setTimeout(nextChapter, 4000);
        } else if (chances > 0) {
            nav.innerHTML = "<b>【失敗】</b> 志銘重重摔在地上。孩子大聲啼哭，引起了巡警的注意，妳趕緊抱起他逃進暗巷。妳還有 " + chances + " 次機會。";
            spinBtn.disabled = false; 
        } else {
            spinBtn.dataset.ended = "true";
            spinBtn.disabled = true;
            spinBtn.innerHTML = "次數已耗盡";
            nav.innerHTML = "<b>【結局】</b> 運氣耗盡。志銘跟著妳四處流浪，多年後妳在基隆港邊的寒風中耗盡氣息。志銘目睹了這一切，最終被一對廣東夫婦領養。";
            setTimeout(nextChapter, 6000);
        }
        draw();
    }

    function nextChapter() {
        const nav = document.getElementById('narrative');
        nav.innerHTML = "<b>福爾摩沙：</b>「以上是這段愛情故事的終點...」<br><br>" +
                        "<button onclick='location.href=\"關卡目錄.html\"' style='padding:10px; cursor:pointer;'>返回目錄</button>";
    }

    draw();
</script>
</body>
</html>
